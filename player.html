<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020b18">
    <title>IPTV PRO Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.min.js"></script>
    <style>
        :root {
            --primary-color: #00f2fe;
            --bg-color: #020b18;
            --text-color: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: opacity 0.3s;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--primary-color);
            transform: scale(1.1);
        }

        .player-title {
            font-weight: 700;
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            flex: 1;
        }

        #player-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pro-video {
            width: 100%;
            height: 100%;
            max-height: 100vh;
            outline: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(0, 242, 254, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid var(--primary-color);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 60;
            max-width: 90%;
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .error-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .retry-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        @media (max-width: 768px) {
            .player-title { font-size: 1rem; }
            .back-btn { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>
    <div class="player-header">
        <button class="back-btn" onclick="goBackToCategory()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="player-title" id="player-title">Loading Stream...</div>
    </div>

    <div id="player-wrapper"></div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Optimizing Stream...</p>
    </div>

    <div id="error-msg">
        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h3>Playback Error</h3>
        <p id="err-detail" style="color: #aaa; margin: 15px 0;"></p>
        <button class="retry-btn" onclick="location.reload()">
            <i class="fas fa-redo"></i> Try Again
        </button>
        <button class="retry-btn" style="background: #333; margin-left: 10px;" onclick="window.history.back()">
            Go Back
        </button>
    </div>

    <script>
        // Pre-register proxy SW before player loads
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw-proxy.js').catch(err => {
                console.log('Proxy SW pre-registration attempt:', err);
            });
        }
    </script>
    <script src="player.js?v=45"></script>
    <script>
        function goBackToCategory() {
            const savedState = sessionStorage.getItem('iptv_state');
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    window.history.back();
                    setTimeout(() => {
                        window.scrollTo(0, state.scrollPos || 0);
                    }, 100);
                } catch (e) {
                    window.history.back();
                }
            } else {
                window.history.back();
            }
        }
    </script>
</body>
</html>
