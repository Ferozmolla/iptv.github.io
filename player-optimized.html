<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV PRO - Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Player Engines -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.compiled.debug.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #player-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            background: #00f2fe;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: white;
            font-family: sans-serif;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #00f2fe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            display: none;
            z-index: 60;
            width: 80%;
            max-width: 400px;
            font-family: sans-serif;
        }
        .retry-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: #00f2fe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="player-wrapper"></div>
    
    <button class="back-btn" onclick="goBackToDashboard()">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </button>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Connecting to stream...</p>
    </div>

    <div id="error-msg">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #00f2fe; margin-bottom: 15px;"></i>
        <h2>Playback Error</h2>
        <p id="err-detail">The stream could not be loaded. It might be offline or unsupported.</p>
        <button class="retry-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script>
        function goBackToDashboard() {
            // Get the saved category and view from localStorage
            const lastCategory = localStorage.getItem('lastCategory') || 'all';
            const lastView = localStorage.getItem('lastView') || 'all';
            
            // Restore the state
            localStorage.setItem('currentCategory', lastCategory);
            localStorage.setItem('currentView', lastView);
            
            // Navigate back to dashboard
            window.location.href = 'index.html';
        }
    </script>
    <script src="player.js"></script>
</body>
</html>
