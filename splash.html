<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV PRO ULTIMATE - Loading</title>
    <style>
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .banner-container {
            width: 80%;
            max-width: 600px;
            margin-bottom: 30px;
            animation: fadeIn 1.5s ease-in-out;
        }
        .banner-img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }
        .loader {
            width: 250px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #00f2fe;
            animation: loading 2s linear infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .status {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <img src="banner.jpg" alt="IPTV ULTRA PRO" class="banner-img">
    </div>
    <div class="loader"></div>
    <div class="status">INITIALIZING ULTRA EXPERIENCE...</div>
    <div class="developer-credit">Developed by FEROZ MOLLA</div>
    <script>
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3500);
    </script>
</body>
</html>
